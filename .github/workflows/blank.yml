name: AI Auto Coder Agent

on:
  issues:
    types: [opened]
  workflow_dispatch: # Ini tambahan agar muncul tombol manual

jobs:
  ngoding-otomatis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Ambil Source Code Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider (AI VCS Tool)
        run: |
          pip install aider-chat

      - name: AI Mulai Menulis Kode & Commit Otomatis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git config --global user.name "ai-developer-bot"
          git config --global user.email "ai-bot@users.noreply.github.com"
          
          # Jika dijalankan manual, AI akan mengecek status repo. Jika lewat Issue, akan baca perintahnya.
          PESAN="${{ github.event.issue.body || 'Tolong rapikan kode ini' }}"
          aider --model gemini/gemini-2.5-flash --message "$PESAN" --auto-commit --yes

      - name: Push Hasil Kode ke Repositori
        run: |
          git push origin main
